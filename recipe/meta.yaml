{% set name = "akismet" %}
{% set version = "25.10.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/akismet-{{ version }}.tar.gz
  sha256: 28032b6b4f7c679fe828290e46d2ad9c2d0a7d20ea0a514a35de5ee9f6e69458

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.5
  run:
    - python >=3.5
    - requests

test:
  imports:
    - akismet
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/ubernostrum/akismet
  summary: A Python interface to the Akismet spam-filtering API.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mxr-conda
    - Admax18
